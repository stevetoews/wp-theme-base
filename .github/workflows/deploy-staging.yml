name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy theme via rsync
        run: |
          THEME_DIR="/sites/staging.treethink.net/files/wp-content/themes/wp-theme-base"
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='*.md' \
            --rsync-path="sudo -u staging rsync" \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }}:${THEME_DIR}/

      - name: Activate theme via WP-CLI
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }} \
            "wp --path=/sites/staging.treethink.net/files theme activate wp-theme-base"
